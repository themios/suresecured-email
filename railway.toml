[build]
builder = "nixpacks"

[deploy]
startCommand = "npm start"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"

[[cron]]
schedule = "*/15 * * * *"
command = "curl -s -X POST https://$RAILWAY_PUBLIC_DOMAIN/cron/send-sequences -H \"Authorization: Bearer $CRON_SECRET\""

[[cron]]
schedule = "0 6 * * *"
command = "curl -s -X POST https://$RAILWAY_PUBLIC_DOMAIN/cron/daily-digest -H \"Authorization: Bearer $CRON_SECRET\""

[[cron]]
schedule = "30 6 * * *"
command = "curl -s -X POST https://$RAILWAY_PUBLIC_DOMAIN/cron/score-leads -H \"Authorization: Bearer $CRON_SECRET\""

# AI marketing agents — weekly fan-out (Mondays 07:00 UTC). No-op until a tenant
# opts an agent in; Phase 07 runs the Reporting agent's weekly cross-agent rollup.
[[cron]]
schedule = "0 7 * * 1"
command = "curl -s -X POST https://$RAILWAY_PUBLIC_DOMAIN/cron/run-agents -H \"Authorization: Bearer $CRON_SECRET\""

# Email intake sources — poll connected inboxes for new leads every 15 minutes.
# No-op until a tenant connects a source under Settings -> Email Sources.
[[cron]]
schedule = "*/15 * * * *"
command = "curl -s -X POST https://$RAILWAY_PUBLIC_DOMAIN/cron/poll-email-sources -H \"Authorization: Bearer $CRON_SECRET\""
